title: "Le Gîte de Lierneux"    # property name — used in <title> tags
description: "Gîte 4 personnes avec piscine chauffée, jacuzzi extérieur, sauna tonneau et hammam. Propriété clôturée au cœur des Ardennes belges."
baseurl: ""
# Deployed URL — must match SITE_URL in wrangler.toml.
# Update both when switching from the Cloudflare Pages domain to a custom domain.
url: "https://eric-matthieu.pages.dev"

markdown: kramdown

# ── jekyll-picture-tag ──────────────────────────────────
picture:
  output: "generated"
  presets:
    # Full-width hero image
    hero:
      formats: [webp, original]
      widths: [480, 900, 1440, 1920]
      sizes:
        fallback: 100vw
    # Presentation section (interior/exterior, 58 vw on desktop)
    content:
      formats: [webp, original]
      widths: [480, 800, 1170]
      sizes:
        "(min-width: 1024px)": 58vw
        fallback: 100vw
    # Horizontal gallery cards
    gallery:
      formats: [webp, original]
      widths: [400, 800]
      sizes:
        "(min-width: 768px)": 38vw
        fallback: 85vw
permalink: pretty

# ── jekyll-polyglot ─────────────────────────────────────
languages: ["fr", "en"]
default_lang: "fr"
exclude_from_localization:
  - "assets"
  - "generated"
  - "functions"
  - "scripts"
  - "robots.txt"
  - "sitemap.xml"
  - "CLAUDE.md"
  - "README.md"
  - "wrangler.toml"
  - "schema.sql"
  - "package.json"
  - "package-lock.json"
  - "secrets.json"
parallel_localization: false

plugins:
  - jekyll-sitemap
  - jekyll-polyglot

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .git/
  - example.html
  - secrets.json
  - .dev.vars
  - "*.sh"
