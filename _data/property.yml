# ─────────────────────────────────────────────────────────
# Property data — fill all fields before designing the site.
# Edit this file to update all content across the site.
# Translatable fields have fr/en sub-keys.
# Array items use label_en / text_en / alt_en etc. for English variants.
# ─────────────────────────────────────────────────────────

name:       "REPLACE_ME"        # e.g. "Domaine des Loups"
short_name: "REPLACE_ME"        # e.g. "Le Domaine" — used in hero h1

tagline:
  fr: "REPLACE_ME"              # e.g. "Chalet & Forêt — Ardennes Belges"
  en: "REPLACE_ME"

subtitle:
  fr: "REPLACE_ME"              # short line above hero title
  en: "REPLACE_ME"

description:
  fr: "REPLACE_ME"              # 1–2 sentence property description
  en: "REPLACE_ME"

intro:
  fr: "REPLACE_ME"              # longer intro paragraph (presentation section)
  en: "REPLACE_ME"

footer_tagline:
  fr: "REPLACE_ME"              # short evocative phrase for the footer
  en: "REPLACE_ME"

hero_image:     "/assets/images/hero.jpg"
hero_image_alt:
  fr: "REPLACE_ME"
  en: "REPLACE_ME"

# ── Capacity ────────────────────────────────────────────
capacity:
  guests:    0      # REPLACE — must match MAX_GUESTS in wrangler.toml
  bedrooms:  0      # REPLACE
  bathrooms: 0      # REPLACE
  area_m2:   0      # REPLACE
  land_ha:   0      # REPLACE (omit or set to 0 if not applicable)

# ── Check-in / Check-out ─────────────────────────────────
checkin_time:  "REPLACE_ME"     # e.g. "16h00"
checkout_time: "REPLACE_ME"     # e.g. "11h00"

# ── Pricing ─────────────────────────────────────────────
pricing:
  per_night: 0      # REPLACE — must match PRICE_PER_NIGHT in wrangler.toml
  currency:  "€"
  note:
    fr: "REPLACE_ME"            # e.g. "Taxes & frais de ménage inclus"
    en: "REPLACE_ME"

# ── Location ────────────────────────────────────────────
location:
  address_line1: "REPLACE_ME"   # street / lieu-dit
  address_line2: "REPLACE_ME"   # postal code + city
  country:
    fr: "REPLACE_ME"            # e.g. "Belgique"
    en: "REPLACE_ME"            # e.g. "Belgium"
  country_code:  "BE"           # ISO 3166-1 alpha-2
  region:        "REPLACE_ME"   # e.g. "Ardennes Belges"
  maps_url:      "REPLACE_ME"   # Google Maps URL

# ── Contact ─────────────────────────────────────────────
contact:
  owner_name: "REPLACE_ME"      # full name — used in CGV
  email:      "REPLACE_ME"      # must match OWNER_EMAIL in wrangler.toml
  phone:      "REPLACE_ME"      # e.g. "+32 475 00 00 00"

# ── Social ──────────────────────────────────────────────
social:
  instagram: "#"                # URL or "#" if not used
  facebook:  "#"                # URL or "#" if not used

# ── Belgian Compliance ──────────────────────────────────
compliance:
  registration_number: "REPLACE_ME"   # e.g. "N° ETA-XXXX-XXXX"
  registration_body:   "Commissariat Général au Tourisme de Wallonie"
  payment_note:        "Paiement en ligne sécurisé via Stripe. Aucune donnée bancaire stockée."

# ── Concept Sections ────────────────────────────────────
# Two sections shown in presentation.html: interior (first) and exterior (last).
concept:
  - number:      "01"
    label:       "REPLACE_ME"         # e.g. "L'Intérieur"
    label_en:    "REPLACE_ME"         # e.g. "The Interior"
    title:       "REPLACE_ME"
    title_en:    "REPLACE_ME"
    description: >
      REPLACE_ME
    description_en: >
      REPLACE_ME
    image:        "/assets/images/interior.jpg"
    image_alt:    "REPLACE_ME"
    image_alt_en: "REPLACE_ME"
    reverse:      false
    features:
      - { icon: "REPLACE_ME", text: "REPLACE_ME", text_en: "REPLACE_ME" }
      - { icon: "REPLACE_ME", text: "REPLACE_ME", text_en: "REPLACE_ME" }
      - { icon: "REPLACE_ME", text: "REPLACE_ME", text_en: "REPLACE_ME" }
      - { icon: "REPLACE_ME", text: "REPLACE_ME", text_en: "REPLACE_ME" }

  - number:      "02"
    label:       "REPLACE_ME"         # e.g. "L'Extérieur"
    label_en:    "REPLACE_ME"         # e.g. "The Outdoors"
    title:       "REPLACE_ME"
    title_en:    "REPLACE_ME"
    description: >
      REPLACE_ME
    description_en: >
      REPLACE_ME
    image:        "/assets/images/exterior.jpg"
    image_alt:    "REPLACE_ME"
    image_alt_en: "REPLACE_ME"
    reverse:      true
    features:
      - { icon: "REPLACE_ME", text: "REPLACE_ME", text_en: "REPLACE_ME" }
      - { icon: "REPLACE_ME", text: "REPLACE_ME", text_en: "REPLACE_ME" }
      - { icon: "REPLACE_ME", text: "REPLACE_ME", text_en: "REPLACE_ME" }
      - { icon: "REPLACE_ME", text: "REPLACE_ME", text_en: "REPLACE_ME" }

# ── Amenities ───────────────────────────────────────────
# Icon names from Lucide: https://lucide.dev/icons
amenities:
  - { icon: "REPLACE_ME", label: "REPLACE_ME", label_en: "REPLACE_ME" }
  - { icon: "REPLACE_ME", label: "REPLACE_ME", label_en: "REPLACE_ME" }
  - { icon: "REPLACE_ME", label: "REPLACE_ME", label_en: "REPLACE_ME" }

# ── Gallery ─────────────────────────────────────────────
# Add as many images as needed. Filenames must match files in assets/images/.
gallery:
  - url:        "/assets/images/gallery-1.jpg"
    alt:        "REPLACE_ME"
    alt_en:     "REPLACE_ME"
    caption:    "REPLACE_ME"
    caption_en: "REPLACE_ME"

# ── Booking ─────────────────────────────────────────────
booking:
  response_hours: 24   # Owner response time — must match RESPONSE_HOURS in wrangler.toml
