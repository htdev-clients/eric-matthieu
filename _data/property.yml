  - { icon: "utensils",     label: "Cuisine équipée",            label_en: "Fully equipped kitchen" }
  - { icon: "tv-2",         label: "TV connectée",               label_en: "Smart TV" }
  - { icon: "key-round",    label: "Entrée autonome (boîte à clé)", label_en: "Autonomous entry (key box)" }
