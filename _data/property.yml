# ─────────────────────────────────────────────────────────
# Property data — fill all fields before designing the site.
# Edit this file to update all content across the site.
# Translatable fields have fr/en sub-keys.
# Array items use label_en / text_en / alt_en etc. for English variants.
# ─────────────────────────────────────────────────────────

name:       "Le Gîte de Lierneux"
short_name: "Le Gîte"

tagline:
  fr: "Piscine chauffée & Jacuzzi — Ardennes Belges"
  en: "Heated Pool & Jacuzzi — Belgian Ardennes"

subtitle:
  fr: "Escapade au cœur des Ardennes"
  en: "A retreat in the heart of the Ardennes"

description:
  fr: "Gîte 4 personnes avec piscine chauffée, jacuzzi extérieur, sauna tonneau et hammam. Propriété clôturée et autonome au cœur des Ardennes belges."
  en: "4-person holiday home with heated pool, outdoor jacuzzi, barrel sauna and hammam. Fully enclosed, self-catering property in the heart of the Belgian Ardennes."

intro:
  fr: >
    Deux chambres, deux salles de bain, 4 personnes — et tout le reste dehors.
    La piscine chauffée (8,7 m × 4,35 m), le jacuzzi 5 places avec sono et LEDs,
    le sauna tonneau et le hammam font de ce gîte un endroit à part.
    La forêt est à 100 mètres. La propriété est entièrement clôturée, l'entrée autonome.
    Vous n'aurez besoin de rien d'autre.
  en: >
    Two bedrooms, two bathrooms, four guests — and the outdoors does the rest.
    The heated pool (8.7 m × 4.35 m), 5-seat jacuzzi with speakers and LEDs,
    barrel sauna and hammam make this a property unlike most.
    The forest is 100 metres away. Fully enclosed grounds, autonomous entry.
    You won't need anything else.

footer_tagline:
  fr: "Piscine · Jacuzzi · Sauna · Ardennes"
  en: "Pool · Jacuzzi · Sauna · Ardennes"

hero_image:     "/assets/images/hero.jpg"
hero_image_alt:
  fr: "Piscine chauffée du Gîte de Lierneux en Ardennes belges"
  en: "Heated pool at Le Gîte de Lierneux in the Belgian Ardennes"

# ── Capacity ────────────────────────────────────────────
capacity:
  guests:    4      # must match MAX_GUESTS in wrangler.toml
  bedrooms:  2
  bathrooms: 2
  area_m2:   0      # MISSING — ask client
  land_ha:   0      # not applicable / unknown

# ── Check-in / Check-out ─────────────────────────────────
checkin_time:  "MISSING"     # MISSING — ask client (e.g. "16h00")
checkout_time: "MISSING"     # MISSING — ask client (e.g. "10h00")

# ── Pricing ─────────────────────────────────────────────
pricing:
  per_night: 500
  currency:  "€"
  note:
    fr: "Tout inclus — linge, serviettes, charges, ménage final"
    en: "All-inclusive — linen, towels, utilities, final clean"

# ── Location ────────────────────────────────────────────
location:
  address_line1: "MISSING"           # MISSING — ask client (street / lieu-dit)
  address_line2: "4990 Lierneux"
  country:
    fr: "Belgique"
    en: "Belgium"
  country_code:  "BE"
  region:        "Ardennes Belges"
  maps_url:      "MISSING"           # MISSING — ask client (Google Maps URL)

# ── Contact ─────────────────────────────────────────────
contact:
  owner_name: "Éric Matthieu"
  email:      "REPLACE_ME@example.com"
  phone:      "MISSING"              # MISSING — ask client

# ── Social ──────────────────────────────────────────────
social:
  instagram: "#"                     # MISSING — ask client
  facebook:  "#"                     # MISSING — ask client

# ── Belgian Compliance ──────────────────────────────────
compliance:
  registration_number: "MISSING"     # MISSING — ask client (N° ETA-XXXX-XXXX)
  registration_body:   "Commissariat Général au Tourisme de Wallonie"
  payment_note:        "Virement bancaire. Acompte de 30% à la réservation, solde 30 jours avant l'arrivée."

# ── Booking ─────────────────────────────────────────────
booking:
  response_hours: 24      # must match RESPONSE_HOURS in wrangler.toml
  min_nights:     2       # REVIEW — confirm with client
  deposit_eur:    600     # REVIEW — 600€ standard, 750€ for stays >7 nights
  deposit_long_eur: 750   # REVIEW — stays >7 nights

# ── Concept Sections ────────────────────────────────────
# Two sections shown in presentation.html: interior (first) and exterior/wellness (last).
concept:
  - number:      "01"
    label:       "L'Intérieur"
    label_en:    "Inside"
    title:       "Confort et calme"
    title_en:    "Comfort and quiet"
    description: >
      Deux chambres bien séparées, deux salles de bain complètes.
      La cuisine est ouverte et équipée, le salon lumineux.
      Tout est pensé pour que vous n'ayez qu'à poser vos valises.
    description_en: >
      Two well-separated bedrooms, two full bathrooms.
      Open, fully equipped kitchen, bright living room.
      Everything is ready so you can just arrive and unwind.
    image:        "/assets/images/presentation-interior.jpg"
    image2:       "/assets/images/presentation-pool.jpg"
    image_alt:    "Chambre lumineuse du gîte de Lierneux"
    image_alt_en: "Bright bedroom at Le Gîte de Lierneux"
    reverse:      false
    features:
      - { icon: "bed-double",   text: "2 chambres",                     text_en: "2 bedrooms" }
      - { icon: "bath",         text: "2 salles de bain complètes",     text_en: "2 full bathrooms" }
      - { icon: "utensils",     text: "Cuisine équipée",                text_en: "Fully equipped kitchen" }
      - { icon: "wifi",         text: "WiFi haut débit",                text_en: "High-speed WiFi" }

  - number:      "02"
    label:       "Le Bien-être"
    label_en:    "Wellness"
    title:       "Piscine, jacuzzi, sauna"
    title_en:    "Pool, jacuzzi, sauna"
    description: >
      La piscine chauffée (8,7 m × 4,35 m) est ouverte de mai à septembre.
      Le jacuzzi Fox Spas 5 places — 63 jets, LEDs, sono — est disponible toute l'année
      sous la terrasse couverte. Le sauna tonneau et le hammam complètent l'ensemble.
    description_en: >
      The heated pool (8.7 m × 4.35 m) is open from May to September.
      The Fox Spas 5-seat jacuzzi — 63 jets, LEDs, speakers — is available year-round
      under the covered terrace. The barrel sauna and hammam round out the offering.
    image:        "/assets/images/presentation-pool.jpg"
    image_alt:    "Piscine chauffée vue depuis la terrasse du gîte"
    image_alt_en: "Heated pool seen from the terrace"
    reverse:      true
    features:
      - { icon: "waves",          text: "Piscine chauffée 8,7 × 4,35 m (mai–sept)", text_en: "Heated pool 8.7 × 4.35 m (May–Sept)" }
      - { icon: "sparkles",       text: "Jacuzzi 5 places, 63 jets, LEDs, sono",    text_en: "5-seat jacuzzi, 63 jets, LEDs, speakers" }
      - { icon: "flame",          text: "Sauna tonneau 4 personnes",                text_en: "4-person barrel sauna" }
      - { icon: "droplets",       text: "Hammam (salle de bain 2)",                 text_en: "Hammam (bathroom 2)" }

