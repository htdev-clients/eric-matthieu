{% assign p = site.data.property %}
{% assign t = site.data.i18n[site.active_lang] %}
<!--
  ═══════════════════════════════════════════════════════════
  HERO — design this section from scratch per client.
  ═══════════════════════════════════════════════════════════
  Required: full-screen or large header with hero image, property name,
  tagline, and two CTA buttons.

  Available Liquid data:
    p.name, p.short_name
    p.subtitle[site.active_lang]
    p.tagline[site.active_lang]
    p.description[site.active_lang]
    p.hero_image                    ← image path, e.g. "/assets/images/hero.jpg"
    p.hero_image_alt[site.active_lang]
    p.capacity.guests, p.capacity.bedrooms
    p.pricing.per_night, p.pricing.currency

  i18n keys:
    t.hero.cta_check                ← "Vérifier les disponibilités"
    t.hero.cta_discover             ← "Découvrir"
    t.hero.scroll                   ← "Défiler"

  CTA targets: #booking (reservation form), #presentation (property detail)

  Responsive image (switch from <img> to {% picture %} once images are ready):
    {% assign hero_src = p.hero_image | remove_first: "/" %}
    {% picture hero {{ hero_src }} alt="{{ p.hero_image_alt[site.active_lang] }}"
       class="..." --picture class="..." %}

  CSS classes available from head.html:
    .hero-reveal        ← fade-in animation on load
    .hero-reveal-delay  ← same, with 0.4 s delay
  ═══════════════════════════════════════════════════════════
-->
<header id="accueil">
  <img src="{{ p.hero_image }}" alt="{{ p.hero_image_alt[site.active_lang] }}">
  <h1>{{ p.name }}</h1>
  <p>{{ p.description[site.active_lang] }}</p>
  <a href="#booking">{{ t.hero.cta_check }}</a>
  <a href="#presentation">{{ t.hero.cta_discover }}</a>
</header>
